name: Artifact-Demo-Deployment
on:
    push:
        branches:
            - main
            - dev
    pull_request:
        branches:
            - main
            - dev
    workflow_dispatch:
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v3
            - name: Install Dependencies
              run: npm ci
            - name: Lint code
              run: npm run lint  
            - name: Test code
              run: npm run test